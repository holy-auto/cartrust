name: Render Ledra Video

on:
  push:
    branches:
      - claude/create-ledra-video-YinpF
    paths:
      - "remotion/**"
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome for Remotion
        run: npx remotion browser ensure

      - name: Render video
        run: |
          mkdir -p out
          npx remotion render remotion/index.tsx LedraIntro out/LedraIntro.mp4 \
            --codec=h264 \
            --concurrency=2

      - name: Upload MP4
        uses: actions/upload-artifact@v4
        with:
          name: LedraIntro
          path: out/LedraIntro.mp4
          retention-days: 30
